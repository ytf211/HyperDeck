name: Build APK

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release'
        type: boolean
        default: false
      split_release_by_abi:
        description: 'Split release APKs by ABI (release builds only)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode keystore
        run: echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > app/debug.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Build Debug APK
        if: ${{ !inputs.release }}
        run: ./gradlew assembleDebug --parallel --build-cache --configuration-cache

      - name: Build Release APK
        if: ${{ inputs.release }}
        run: |
          if [ "${{ inputs.split_release_by_abi }}" = "true" ]; then
            ./gradlew assembleRelease --parallel --build-cache --configuration-cache -PsplitReleaseByAbi=true
          else
            ./gradlew assembleRelease --parallel --build-cache --configuration-cache
          fi

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename APKs
        run: |
          cd app/build/outputs/apk
          # Debug (always single universal APK)
          if [ -d debug ] && [ -f debug/app-debug.apk ]; then
            mv debug/app-debug.apk "debug/HyperDeck-${{ steps.version.outputs.version }}-debug.apk"
          fi
          # Release (universal only or ABI-specific only, depending on workflow input)
          if [ -d release ]; then
            for f in release/*.apk; do
              [ -f "$f" ] || continue
              base=$(basename "$f" .apk)
              if [[ "$base" =~ app-([a-z0-9_-]+)-release ]]; then
                abi="${BASH_REMATCH[1]}"
                mv "$f" "release/HyperDeck-${{ steps.version.outputs.version }}-${abi}.apk"
              elif [[ "$base" == "app-release" ]]; then
                mv "$f" "release/HyperDeck-${{ steps.version.outputs.version }}-universal.apk"
              fi
            done
          fi

      - name: Upload Debug APK
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@v5
        with:
          name: HyperDeck-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APKs
        if: ${{ inputs.release }}
        uses: actions/upload-artifact@v5
        with:
          name: HyperDeck-release
          path: app/build/outputs/apk/release/*.apk

      - name: Generate Release Notes
        if: ${{ inputs.release }}
        run: |
          cat > RELEASE_NOTES.md <<EOF
          ## HyperDeck ${{ steps.version.outputs.tag }}

          Android 系统管理工具，基于 Shizuku 提供 ADB/Root 级别的系统操控能力。

          ### 主要功能
          - **系统设置管理** — JSON 驱动的分类设置面板，支持开关/滑块/选择/输入控件
          - **Shell 终端** — 内置命令行，支持命令历史、取消、快捷命令
          - **无障碍服务管理** — 一键开关任意无障碍服务
          - **配置导入导出** — 分享和导入 system_settings.json
          - **自定义分类** — 自由添加/删除/排序工具卡片和设置项
          - **主题切换** — 跟随系统 / 浅色 / 深色 三选一

          ### 下载说明
          EOF

          if [ "${{ inputs.split_release_by_abi }}" = "true" ]; then
            cat >> RELEASE_NOTES.md <<EOF
          | 文件 | 说明 |
          |------|------|
          | \`*-arm64-v8a.apk\` | 64位 ARM 设备 (大多数现代手机) |
          | \`*-armeabi-v7a.apk\` | 32位 ARM 设备 |
          | \`*-x86_64.apk\` | x86_64 模拟器/设备 |
          EOF
          else
            cat >> RELEASE_NOTES.md <<EOF
          | 文件 | 说明 |
          |------|------|
          | \`*-universal.apk\` | 通用版 (体积较大，兼容所有架构) |
          EOF
          fi

          cat >> RELEASE_NOTES.md <<EOF

          > 需要安装 [Shizuku](https://github.com/RikkaApps/Shizuku) 才能使用完整功能。
          EOF

      - name: Create Release
        if: ${{ inputs.release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: HyperDeck ${{ steps.version.outputs.tag }}
          files: |
            app/build/outputs/apk/release/*.apk
          body_path: RELEASE_NOTES.md
